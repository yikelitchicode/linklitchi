<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>linklitchi</title>
    <meta
      name="description"
      content="私人自用 links hub，集中管理 project、tool、site、API 入口。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero-shell">
        <div class="cover-art panel" aria-hidden="true">
          <img class="cover-image" src="./assets/cover-illustration.png" alt="" />
        </div>
        <div class="brand-medallion">
          <span>LL</span>
        </div>
        <div class="hero-copy">
          <h1>linklitchi</h1>
          <p class="hero-meta">
            <span id="activeFilterLabel">All</span>
            <span class="meta-dot"></span>
            <span id="liveClock">--:--</span>
          </p>
        </div>
      </section>

      <section id="controlShell" class="control-shell panel hidden" aria-label="Search and settings">
        <div class="control-head">
          <strong>Search</strong>
          <button id="controlClose" class="control-close" type="button" aria-label="Close search">✕</button>
        </div>
        <input
          id="searchInput"
          type="search"
          placeholder="Search"
          autocomplete="off"
          aria-label="搜尋連結"
        />
        <div class="mini-stats">
          <span><strong id="totalCount">0</strong> total</span>
          <span><strong id="visibleCount">0</strong> visible</span>
        </div>
        <div class="display-row" aria-label="欄數切換">
          <span class="display-label">Layout</span>
          <div class="display-picker">
            <button class="display-btn active" type="button" data-cols="1">1</button>
            <button class="display-btn" type="button" data-cols="2">2</button>
            <button class="display-btn" type="button" data-cols="3">3</button>
            <button class="display-btn" type="button" data-cols="4">4</button>
          </div>
        </div>
        <div class="display-row view-row" aria-label="檢視切換">
          <span class="display-label">View</span>
          <div class="display-picker view-picker">
            <button class="display-btn view-btn active" type="button" data-view="list">List</button>
            <button class="display-btn view-btn" type="button" data-view="app">App</button>
            <button class="display-btn view-btn" type="button" data-view="table">Table</button>
          </div>
        </div>
      </section>

      <section class="content-section">
        <div id="listView" class="card-grid"></div>
        <div id="appView" class="app-grid hidden"></div>
        <div id="tableView" class="native-table-wrap hidden">
          <table class="native-table">
            <thead>
              <tr>
                <th scope="col">
                  <button class="table-sort active" type="button" data-sort-key="name">Name</button>
                </th>
                <th scope="col">
                  <button class="table-sort" type="button" data-sort-key="url">URL</button>
                </th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <nav class="bottom-nav panel" aria-label="分類切換">
      <button class="nav-btn active" type="button" data-category="all">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7.5A2.5 2.5 0 0 1 7.5 5h9A2.5 2.5 0 0 1 19 7.5v9a2.5 2.5 0 0 1-2.5 2.5h-9A2.5 2.5 0 0 1 5 16.5z"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
        </span>
        <span>All</span>
      </button>
      <button class="nav-btn" type="button" data-category="Project">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.5 8.5 12 5l5.5 3.5v7L12 19l-5.5-3.5z"/><path d="M12 5v14"/></svg>
        </span>
        <span>Project</span>
      </button>
      <button class="nav-btn" type="button" data-category="Tool">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m14.5 6 3.5 3.5-8.5 8.5H6v-3.5z"/><path d="M13 7.5 16.5 11"/></svg>
        </span>
        <span>Tool</span>
      </button>
      <button class="nav-btn" type="button" data-category="Site">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5a7 7 0 1 0 0 14a7 7 0 0 0 0-14Z"/><path d="M5 12h14M12 5c1.8 2 2.7 4.3 2.7 7S13.8 17 12 19c-1.8-2-2.7-4.3-2.7-7S10.2 7 12 5Z"/></svg>
        </span>
        <span>Site</span>
      </button>
      <button class="nav-btn" type="button" data-category="API">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 8h8v8H8z"/><path d="M12 4v4M12 16v4M4 12h4M16 12h4"/></svg>
        </span>
        <span>API</span>
      </button>
    </nav>

    <template id="linkCardTemplate">
      <article class="link-card">
        <div class="link-card-icon">
          <span class="icon-glyph"></span>
        </div>
        <div class="link-card-main">
          <h3 class="card-title"></h3>
          <span class="link-host"></span>
        </div>
        <div class="link-card-actions">
          <a class="link-jump" target="_blank" rel="noreferrer" aria-label="Open link">→</a>
        </div>
      </article>
    </template>

    <template id="listSectionTemplate">
      <section class="list-section">
        <h2 class="section-title"></h2>
        <div class="section-list"></div>
      </section>
    </template>

    <template id="tableRowTemplate">
      <tr>
        <td class="table-name-cell">
          <a class="table-name-link" target="_blank" rel="noreferrer">
            <div class="table-name-stack">
              <strong class="table-title"></strong>
            </div>
          </a>
        </td>
        <td class="table-url-cell">
          <button class="table-url-button" type="button">
            <span class="table-url"></span>
          </button>
        </td>
      </tr>
    </template>

    <template id="appIconTemplate">
      <a class="app-icon-card" target="_blank" rel="noreferrer">
        <span class="app-icon-tile">
          <span class="icon-glyph"></span>
        </span>
        <span class="app-icon-label"></span>
      </a>
    </template>

    <button id="controlToggle" class="control-fab" type="button" aria-expanded="false" aria-controls="controlShell" aria-label="Open search">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6.5"></circle><path d="m16 16 4 4"></path></svg>
    </button>

    <script src="./data/default-links.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
